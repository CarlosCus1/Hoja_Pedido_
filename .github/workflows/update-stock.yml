name: Actualizar Stock desde Appweb

on:
  # Ejecutar automáticamente cada hora entre 7:00 am y 23:00 (hora Perú)
  # Hora Perú = UTC-5
  # 7:00 am Perú = 12:00 UTC | 23:00 Perú = 04:00 UTC (día siguiente)
  schedule:
    - cron: '0 12-23 * * *'   # 12:00 a 23:00 UTC (7:00 am a 6:00 pm Perú)
    - cron: '0 0-4 * * *'     # 00:00 a 04:00 UTC (7:00 pm a 11:00 pm Perú)
  
  # Permitir ejecución manual desde GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stock:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias
        run: npm install xlsx
      
      - name: Descargar y parsear stock
        run: node scripts/download-stock.js
      
      - name: Verificar cambios
        id: verify-changes
        run: |
          if git diff --quiet public/stock_data.json; then
            echo "No hay cambios en el stock"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Hay cambios en el stock"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit y push a main si hay cambios
        if: steps.verify-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/stock_data.json
          git commit -m "Actualizar stock desde appweb - $(date +'%Y-%m-%d %H:%M')"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
      
      - name: Copiar stock a gh-pages
        if: steps.verify-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Guardar el archivo actualizado temporalmente
          cp public/stock_data.json /tmp/stock_data.json
          
          # Función para volver a main siempre
          cleanup() {
            local exit_code=$?
            echo "Volviendo a main..."
            if ! git checkout main 2>/dev/null; then
              git checkout -b main origin/main 2>/dev/null || echo "⚠️ No se pudo volver a main"
            fi
            return $exit_code
          }
          # Asegurar que siempre volvamos a main al salir
          trap cleanup EXIT
          
          # Limpiar cualquier cambio no commiteado antes de cambiar de rama
          git reset --hard
          
          # Cambiar a rama gh-pages
          git fetch origin gh-pages
          git checkout gh-pages
          
          # Copiar el archivo actualizado a la raíz (gh-pages sirve desde raíz)
          cp /tmp/stock_data.json stock_data.json
          
          # Commit y push a gh-pages
          git add stock_data.json
          git commit -m "Sync: Actualizar stock desde appweb - $(date +'%Y-%m-%d %H:%M')" || echo "No hay cambios para commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages
          
          # Volver a main (el trap EXIT también se ejecutará)
