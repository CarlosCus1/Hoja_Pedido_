<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirigir todas las rutas a index.html para que React Router las maneje
    var path = window.location.pathname;
    var search = window.location.search || '';
    var hash = window.location.hash || '';
    
    // Si ya es index.html, no hacer nada
    if (path === '/index.html') {
      window.location.href = '/' + search + hash;
    } else {
      // Redirigir a la ruta base con los parámetros y hash
      var basePath = '/Hoja_Pedido_/';
      window.location.href = basePath + 'index.html' + search + hash;
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
